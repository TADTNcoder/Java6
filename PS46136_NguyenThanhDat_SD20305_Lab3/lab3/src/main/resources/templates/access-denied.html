<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access Denied</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ef4444, #7f1d1d);
            font-family: Arial, sans-serif;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 18px 40px rgba(0,0,0,0.25);
        }

        .card h2 {
            color: #b91c1c;
            margin-top: 0;
        }

        .card p {
            color: #374151;
            margin-bottom: 24px;
        }

        .card a {
            display: inline-block;
            text-decoration: none;
            background: #2563eb;
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: bold;
        }

        .card a:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Access Denied</h2>
    <p>Bạn không có quyền truy cập trang này.</p>
    <a th:href="@{/}">Về trang chủ</a>
</div>
</body>
</html>
