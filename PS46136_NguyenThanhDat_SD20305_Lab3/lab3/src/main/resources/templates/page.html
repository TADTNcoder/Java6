<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lab 3 - Spring Security</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            padding: 35px;
        }

        .title {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .sub-title {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .menu a {
            text-decoration: none;
            background: #4f46e5;
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            transition: 0.3s;
            font-weight: bold;
        }

        .menu a:hover {
            background: #3730a3;
            transform: translateY(-2px);
        }

        .message-box {
            background: #f3f4f6;
            border-left: 6px solid #4f46e5;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
        }

        .message-box h3 {
            margin: 0;
            color: #222;
        }

        .info-box {
            background: #eef2ff;
            border-radius: 14px;
            padding: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="title">Lab 3 - Spring Security</h1>
    <p class="sub-title">Google Login + @PreAuthorize</p>

    <div class="menu">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/poly/url0}">URL0</a>
        <a th:href="@{/poly/url1}">URL1</a>
        <a th:href="@{/poly/url2}">URL2</a>
        <a th:href="@{/poly/url3}">URL3</a>
        <a th:href="@{/poly/url4}">URL4</a>
    </div>

    <div class="message-box">
        <h3 th:text="${message}">Message here</h3>
    </div>

    <div class="info-box">
        <div th:replace="user-info :: userInfo"></div>
    </div>
</div>
</body>
</html>
