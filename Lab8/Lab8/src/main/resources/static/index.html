<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 8 Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 24px;
            background: #f3f6fb;
        }
        .chat-card {
            max-width: 820px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #d8d8d8;
            border-radius: 8px;
            padding: 16px;
        }
        .toolbar, .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .toolbar input, .input-row input {
            flex: 1;
            padding: 8px;
        }
        button {
            padding: 8px 12px;
            cursor: pointer;
        }
        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
        }
        .box {
            border: 1px solid #dcdcdc;
            border-radius: 6px;
            padding: 12px;
            min-height: 280px;
            background: #fafafa;
        }
        ul {
            margin: 0;
            padding-left: 20px;
        }
        .status {
            margin-bottom: 8px;
            color: #444;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div id="app" class="chat-card">
    <h2>WebSocket Chat - Lab 8</h2>
    <div class="toolbar">
        <input v-model.trim="username" placeholder="Username">
        <button @click="connect" :disabled="connected || !username">Connect</button>
        <button @click="disconnect" :disabled="!connected">Disconnect</button>
    </div>
    <div class="grid">
        <div class="box">
            <div class="status">Output</div>
            <ul>
                <li v-for="(m, idx) in messages" :key="idx">
                    <strong>{{ m.sender }}:</strong> {{ m.content }}
                </li>
            </ul>
        </div>
        <div class="box">
            <div class="status">Online Users</div>
            <ul>
                <li v-for="(u, idx) in onlineUsers" :key="idx">{{ u }}</li>
            </ul>
        </div>
    </div>
    <div class="input-row" style="margin-top:12px;">
        <input v-model.trim="message" placeholder="Message" @keyup.enter="send">
        <button @click="send" :disabled="!connected || !message">Send</button>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.1.1/bundles/stomp.umd.min.js"></script>
<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                stompClient: null,
                username: "",
                message: "",
                messages: [],
                onlineUsers: [],
                connected: false
            };
        },
        methods: {
            connect() {
                if (this.connected || !this.username) return;
                const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
                const brokerURL = `${wsScheme}://${window.location.host}/ws`;

                this.stompClient = new StompJs.Client({
                    brokerURL,
                    reconnectDelay: 0,
                    onConnect: () => {
                        this.connected = true;
                        this.messages.push({ sender: "System", content: "Connected" });

                        this.stompClient.subscribe("/topic/messages", (frame) => {
                            const payload = JSON.parse(frame.body);
                            if (payload.type === "CHAT") {
                                this.messages.push({
                                    sender: payload.sender || "Unknown",
                                    content: payload.content || ""
                                });
                            }
                        });

                        this.stompClient.subscribe("/topic/users", (frame) => {
                            const payload = JSON.parse(frame.body);
                            const users = Array.isArray(payload.onlineUsers)
                                ? payload.onlineUsers
                                : (payload.content ? payload.content.split(",").map(x => x.trim()).filter(Boolean) : []);
                            this.onlineUsers = users;
                            this.messages.push({
                                sender: "System",
                                content: `${payload.type || "UPDATE"} users: ${users.join(", ")}`
                            });
                        });

                        this.stompClient.publish({
                            destination: "/app/username",
                            body: JSON.stringify({
                                sender: this.username,
                                type: "JOIN",
                                content: this.username
                            })
                        });
                    },
                    onStompError: () => {
                        this.connected = false;
                        this.messages.push({ sender: "System", content: "Server error" });
                    },
                    onWebSocketClose: () => {
                        this.connected = false;
                    }
                });

                this.stompClient.activate();
            },
            disconnect() {
                if (!this.stompClient) return;
                this.stompClient.deactivate();
                this.stompClient = null;
                this.connected = false;
                this.onlineUsers = this.onlineUsers.filter(u => u !== this.username);
                this.messages.push({ sender: "System", content: "Disconnected" });
            },
            send() {
                if (!this.connected || !this.message) return;
                this.stompClient.publish({
                    destination: "/app/chat.send",
                    body: JSON.stringify({
                        sender: this.username,
                        type: "CHAT",
                        content: this.message
                    })
                });
                this.message = "";
            }
        }
    }).mount("#app");
</script>
</body>
</html>
