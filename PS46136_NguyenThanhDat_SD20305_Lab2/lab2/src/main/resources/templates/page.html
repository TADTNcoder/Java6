<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">My App</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>


                <li class="nav-item">
                    <a class="nav-link" th:href="@{/poly/url1}">URL1</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/poly/url2}">URL2</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/poly/url3}">URL3</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/poly/url4}">URL4</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- Content -->
<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-body">

            <h2 class="mb-3">Trang chủ</h2>

            <!-- Message -->
            <div class="alert alert-info" th:if="${message}" th:text="${message}"></div>

            <!-- User info -->
            <div class="mt-3">
                <div th:replace="user-info :: userInfo"></div>
            </div>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
