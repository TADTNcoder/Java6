<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Test Axios Lab 6</title>

    <!-- Bootstrap 5 -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h2 class="mb-3 text-primary">Test Axios - Lab 6</h2>
            <p class="text-muted mb-4">Demo login và gọi API với JWT token</p>

            <div class="mb-4">
                <h5 class="mb-3">Đăng nhập</h5>
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-outline-primary" onclick="loginUser()">Login USER</button>
                    <button class="btn btn-outline-danger" onclick="loginAdmin()">Login ADMIN</button>
                    <button class="btn btn-outline-success" onclick="loginBoth()">Login BOTH</button>
                </div>
            </div>

            <hr>

            <div class="mb-4">
                <h5 class="mb-3">Test API</h5>
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-secondary" onclick="gotoUrl0()">GET /poly/url0</button>
                    <button class="btn btn-secondary" onclick="gotoUrl1()">GET /poly/url1</button>
                    <button class="btn btn-secondary" onclick="gotoUrl2()">GET /poly/url2</button>
                    <button class="btn btn-secondary" onclick="gotoUrl3()">GET /poly/url3</button>
                    <button class="btn btn-secondary" onclick="gotoUrl4()">GET /poly/url4</button>
                </div>
            </div>

            <div class="mb-2">
                <h5>Kết quả</h5>
            </div>
            <pre id="output" class="bg-dark text-light rounded p-3 border" style="min-height: 220px; white-space: pre-wrap;"></pre>
        </div>
    </div>
</div>

<script>
    let token = "";

    function show(data) {
        document.getElementById("output").textContent =
            typeof data === "string" ? data : JSON.stringify(data, null, 2);
    }

    async function loginUser() {
        try {
            const url = "http://localhost:8080/poly/login";
            const data = {
                username: "user@gmail.com",
                password: "123"
            };

            const resp = await axios.post(url, data);
            token = resp.data.token;
            show({
                message: "Login USER thành công",
                token: token
            });
        } catch (error) {
            show(error.response ? error.response.data : error.message);
        }
    }

    async function loginAdmin() {
        try {
            const url = "http://localhost:8080/poly/login";
            const data = {
                username: "admin@gmail.com",
                password: "123"
            };

            const resp = await axios.post(url, data);
            token = resp.data.token;
            show({
                message: "Login ADMIN thành công",
                token: token
            });
        } catch (error) {
            show(error.response ? error.response.data : error.message);
        }
    }

    async function loginBoth() {
        try {
            const url = "http://localhost:8080/poly/login";
            const data = {
                username: "both@gmail.com",
                password: "123"
            };

            const resp = await axios.post(url, data);
            token = resp.data.token;
            show({
                message: "Login BOTH thành công",
                token: token
            });
        } catch (error) {
            show(error.response ? error.response.data : error.message);
        }
    }

    async function gotoUrl0() {
        try {
            const resp = await axios.get("http://localhost:8080/poly/url0");
            show(resp.data);
        } catch (error) {
            show(error.response ? error.response.data : error.message);
        }
    }

    async function gotoUrl1() {
        try {
            const resp = await axios.get("http://localhost:8080/poly/url1", {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });
            show(resp.data);
        } catch (error) {
            show(error.response ? error.response.data : error.message);
        }
    }

    async function gotoUrl2() {
        try {
            const resp = await axios.get("http://localhost:8080/poly/url2", {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });
            show(resp.data);
        } catch (error) {
            show(error.response ? error.response.data : error.message);
        }
    }

    async function gotoUrl3() {
        try {
            const resp = await axios.get("http://localhost:8080/poly/url3", {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });
            show(resp.data);
        } catch (error) {
            show(error.response ? error.response.data : error.message);
        }
    }

    async function gotoUrl4() {
        try {
            const resp = await axios.get("http://localhost:8080/poly/url4", {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });
            show(resp.data);
        } catch (error) {
            show(error.response ? error.response.data : error.message);
        }
    }
</script>
</body>
</html>
