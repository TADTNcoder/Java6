<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="userInfo">

    <!-- Khi đã đăng nhập -->
    <div th:if="${@auth.authenticated}" class="dropdown text-end">

        <button class="btn btn-outline-primary dropdown-toggle" type="button"
                data-bs-toggle="dropdown">
            👤 <span th:text="${@auth.username}"></span>
        </button>

        <ul class="dropdown-menu dropdown-menu-end shadow">

            <li class="dropdown-item">
                <strong>Username:</strong>
                <span th:text="${@auth.username}"></span>
            </li>

            <li class="dropdown-item">
                <strong>Roles:</strong>
                <span th:text="${@auth.roles}"></span>
            </li>

            <li><hr class="dropdown-divider"></li>

            <li>
                <a class="dropdown-item text-danger" th:href="@{/logout}">
                    🚪 Đăng xuất
                </a>
            </li>

            <li th:if="${@auth.hasAnyRole('ADMIN')}">
                <a class="dropdown-item" href="#">
                    ⚙️ Trang quản trị
                </a>
            </li>

        </ul>
    </div>

    <!-- Khi chưa đăng nhập -->
    <div th:unless="${@auth.authenticated}" class="text-end">

        <a th:href="@{/login/form}" class="btn btn-outline-success">
            🔐 Đăng nhập
        </a>

    </div>

</div>

</body>
</html>
